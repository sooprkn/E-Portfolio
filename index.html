<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ken Villa</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://kit.fontawesome.com/5958cb6f66.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <section id="about-me">
      <nav>
          <div class="personal__logo">Ken Villa</div>
          <ul class="nav__link--list">
            <li>
              <a href="" class="
                nav__link--anchor 
                link__hover-effect 
                link__hover-effect--black"
                >Languages</a>
            </li>
            <li>
              <a href="" class="
                nav__link--anchor 
                link__hover-effect 
                link__hover-effect--black"
                >Projects</a>
            </li>
            <li>
              <a href="" class="
              nav__link--anchor 
              nav__link--anchor-primary"
                >Contact</a>
            </li>
          </ul>
      </nav>
      <div class="flex flex-1">
        <div class="about-me__info row">
            <div class="about-me__info--container">
                <figure class="about-me__picture--mask">
                    <img src="assets/me.jpg" class="about-me__picture" alt="Picture of Ken!" />
                </figure>
                <h1 class="about-me__info--title">
                    Hey! I am <span class="text--purple">Ken Villa 👋</span>
                </h1> 
                <p class="about-me__info--para">
                      I am a <strong class="text--purple">frontend software engineer</strong>with a passion for building responsive and functional web applications that provide for great user experiences.
                  </p>  
                  <div class="about-me__links">
                      <a href="https://www.linkedin.com/in/ken-villa/" target="_blank" rel="noopener noreferrer" class="about-me__link">
                          <i class="fa-brands fa-linkedin-in"></i>
                      </a>
                      <a href="https://github.com/ken-villa" target="_blank" rel="noopener noreferrer" class="about-me__link">
                          <i class="fa-brands fa-github"></i>
                      </a>
                      <a href="mailto:ken.villa@example.com" class="about-me__link">
                          <i class="fa-regular fa-envelope"></i>
                      </a>
                      <a href="assets/resume.pdf" target="_blank" rel="noopener noreferrer" class="about-me__link">
                          <i class="fa-solid fa-file"></i>
                      </a>
                  </div>  
          </div>
          <figure class="about-me__img--container">
            <img src="./assets/undraw_websites.svg" class="about-me__img" alt="">
          </figure>
      </div>
    </section>
  </body>
</html>
